<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Preconnect to font origins early for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Preload font CSS to reduce chain length -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" />
    
    <!-- Preload LCP image (logo) for faster Largest Contentful Paint -->
    <link rel="preload" href="/src/assets/aivia-logo-new.png" as="image" type="image/png" />
    
    <title>Aivia</title>
    <link rel="icon" href="/favicon.png" type="image/png" sizes="32x32 64x64 128x128" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="description" content="Set up AI-powered phone agents in minutes. No VAPI, no n8n. Simple, powerful voice AI with Twilio integration." />
    <meta name="author" content="VoiceAgent Pro" />
    
    <!-- Load font stylesheet non-blocking -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" /></noscript>

    <meta property="og:title" content="Aivia - AI Phone Agents for Business" />
    <meta property="og:description" content="Set up AI-powered phone agents in minutes. No VAPI, no n8n. Simple, powerful voice AI with Twilio integration." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.jpg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@AiviaApp" />
    <meta name="twitter:image" content="/favicon.jpg" />
  </head>

  <body>
    <div id="root">
      <!-- Inline critical loading state for faster FCP -->
      <div id="initial-loader" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0a0a;">
        <div style="text-align:center;">
          <div style="width:48px;height:48px;border:3px solid #333;border-top-color:#8b5cf6;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto;"></div>
        </div>
      </div>
      <style>#initial-loader{transition:opacity .2s}@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
