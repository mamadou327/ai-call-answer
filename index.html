<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Preload LCP element (logo) for faster paint -->
    <link rel="preload" href="/assets/aivia-logo-new-BN6Jl0DT.png" as="image" type="image/png" fetchpriority="high" />

    <!-- Self-hosted Inter font (no third-party requests) -->
    <link rel="preload" href="/fonts/inter-latin.woff2" as="font" type="font/woff2" crossorigin />

    <title>Aivia</title>
    <link rel="icon" href="/favicon.png" type="image/png" sizes="32x32 64x64 128x128" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#8b5cf6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Aivia" />
    <meta name="description" content="Aivia is the AI receptionist for service businesses. Answers every call 24/7, takes bookings, and keeps your business running around the clock. No missed calls. No missed revenue." />

    <meta property="og:title" content="Aivia - The AI Receptionist for Service Businesses" />
    <meta property="og:description" content="Aivia is the AI receptionist for service businesses. Answers every call 24/7, takes bookings, and keeps your business running around the clock. No missed calls. No missed revenue." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@AiviaApp" />
    <meta name="twitter:title" content="Aivia - The AI Receptionist for Service Businesses" />
    <meta name="twitter:description" content="Aivia is the AI receptionist for service businesses. Answers every call 24/7, takes bookings, and keeps your business running around the clock. No missed calls. No missed revenue." />
    <meta name="twitter:image" content="/favicon.png" />
  </head>

  <body>
    <div id="root">
      <!-- Inline critical loading state for faster FCP -->
      <div id="initial-loader" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0a0a;">
        <div style="text-align:center;">
          <div style="width:48px;height:48px;border:3px solid #333;border-top-color:#8b5cf6;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto;"></div>
        </div>
      </div>
      <style>#initial-loader{transition:opacity .2s}@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
